<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot</title>
    <link rel="stylesheet" href="/estilo.css" />
  </head>
  <body>
    <main class="pagina">
      <header>
        <h1>Chatbot</h1>
        <p class="legenda">
          Responde com base nos documentos enviados. Sem documentos, responde do
          conhecimento geral do modelo.
        </p>
      </header>

      <section class="documentos">
        <h2>Enviar um documento</h2>
        <form id="formulario-documento">
          <input id="titulo" type="text" placeholder="Título" required maxlength="300" />
          <textarea
            id="conteudo"
            rows="3"
            placeholder="Cole aqui o texto do documento"
            required
          ></textarea>
          <button type="submit">Enviar documento</button>
        </form>
        <p id="aviso-documento" class="aviso" role="status"></p>
      </section>

      <section class="conversa">
        <ol id="mensagens" class="mensagens"></ol>
        <form id="formulario-mensagem">
          <input
            id="pergunta"
            type="text"
            placeholder="Escreva sua mensagem"
            autocomplete="off"
            required
            maxlength="4000"
          />
          <button id="enviar" type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
